<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kebun Ukur Nana — Pengukuran Panjang & Berat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root{
  --bg1:#F3EEFF;
  --bg2:#E9F8F1;
  --paper:#FFFFFF;
  --ink:#3D3352;
  --plum:#4A3B5C;
  --lavender:#8C6FC7;
  --lavender-deep:#6E4FA8;
  --lavender-light:#E4D9F9;
  --mint:#3FB88C;
  --mint-light:#CDF1E3;
  --sky:#4AA3E0;
  --sky-light:#D2ECFB;
  --coral:#FF7A5C;
  --coral-light:#FFDCD2;
  --sun:#FFC94A;
  --sun-light:#FFEFC7;
  --shadow: 0 18px 40px -12px rgba(74,59,92,0.28);
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 8%, #fff 0%, transparent 40%),
    radial-gradient(circle at 90% 15%, var(--sky-light) 0%, transparent 45%),
    radial-gradient(circle at 85% 90%, var(--mint-light) 0%, transparent 45%),
    linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
  background-attachment:fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 14px 34px;
  overflow-x:hidden;
}
h1,h2,h3,.display{font-family:'Fredoka',sans-serif;}
h2{font-size:1.7rem;color:var(--lavender-deep);margin:0 0 6px;}
h3{font-size:1.15rem;color:var(--plum);margin:0 0 6px;}
p{line-height:1.6;font-size:1.02rem;}
button{font-family:'Nunito',sans-serif;cursor:pointer;}

/* ---------- Top: tape progress ---------- */
.tape-wrap{
  width:100%;
  max-width:900px;
  margin-bottom:14px;
}
.tape-title{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:6px;
  padding:0 4px;
}
.brand{
  font-family:'Fredoka',sans-serif;
  font-weight:600;
  color:var(--lavender-deep);
  font-size:1rem;
  display:flex;align-items:center;gap:8px;
}
.brand svg{height:26px;width:auto;}
.page-count{
  font-weight:800;color:var(--plum);
  background:var(--paper);
  border-radius:20px;
  padding:4px 12px;
  font-size:0.85rem;
  box-shadow:0 4px 10px rgba(74,59,92,0.12);
}
.tape{
  position:relative;
  height:42px;
  background:linear-gradient(180deg,#FFFDF3 0%, #FFF6D8 100%);
  border-radius:999px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.08), 0 6px 14px rgba(74,59,92,0.15);
  overflow:visible;
  border:2px solid #F2DFA0;
}
.tape-fill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:999px;
  background:linear-gradient(90deg, var(--mint) 0%, var(--sky) 100%);
  opacity:0.35;
  transition:width .5s cubic-bezier(.4,1.4,.6,1);
}
.tape-ticks{
  position:absolute;inset:0;
  display:flex;align-items:stretch;
}
.tick{
  flex:1;
  position:relative;
  border-right:1px solid rgba(74,59,92,0.15);
  display:flex;align-items:flex-end;justify-content:center;
  cursor:pointer;
}
.tick:last-child{border-right:none;}
.tick span{
  font-size:0.55rem;font-weight:800;color:var(--plum);
  opacity:0.55;
  margin-bottom:3px;
  pointer-events:none;
}
.tick.done span{opacity:0.85;color:var(--mint);}
.tick.current span{opacity:1;color:var(--coral);}
.tape-marker{
  position:absolute;top:-22px;
  width:34px;height:34px;
  transform:translateX(-50%);
  transition:left .5s cubic-bezier(.4,1.4,.6,1);
  filter:drop-shadow(0 4px 6px rgba(74,59,92,0.35));
}

/* ---------- Book ---------- */
.book-stage{
  width:100%;
  max-width:900px;
  perspective:1600px;
}
.book{
  position:relative;
  width:100%;
  min-height:560px;
  background:var(--paper);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:34px 38px 30px;
  overflow:hidden;
  animation:pageIn .45s ease;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(14px) scale(.99);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
.book::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:10px;
  background:linear-gradient(90deg,var(--lavender),var(--sky),var(--mint),var(--sun),var(--coral));
  opacity:0.85;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Fredoka',sans-serif;
  font-weight:600;
  font-size:0.72rem;
  letter-spacing:0.08em;
  color:var(--paper);
  padding:5px 14px;
  border-radius:999px;
  margin-bottom:12px;
}
.eb-tujuan{background:var(--lavender);}
.eb-pemanasan{background:var(--sun);color:var(--plum);}
.eb-koneksi{background:var(--sky);}
.eb-materi{background:var(--mint);}
.eb-contoh{background:var(--coral);}
.eb-latihan{background:var(--lavender-deep);}
.eb-refleksi{background:var(--sky);}
.eb-penutup{background:linear-gradient(90deg,var(--coral),var(--sun));color:var(--plum);}

.content-grid{
  display:flex;gap:28px;align-items:flex-start;
  flex-wrap:wrap;
}
.col-text{flex:1 1 320px;min-width:260px;}
.col-illust{flex:1 1 260px;min-width:220px;display:flex;justify-content:center;align-items:center;}

/* speech bubble */
.speech{
  position:relative;
  background:var(--lavender-light);
  border-radius:18px;
  padding:12px 16px;
  font-weight:700;
  color:var(--lavender-deep);
  font-size:0.95rem;
  margin:10px 0;
  display:inline-block;
}
.speech::after{
  content:'';
  position:absolute;left:22px;bottom:-9px;
  width:18px;height:18px;
  background:var(--lavender-light);
  clip-path:polygon(0 0,100% 0,0 100%);
}
.nana-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;}

/* cards / chips */
.card-list{list-style:none;margin:10px 0;padding:0;display:flex;flex-direction:column;gap:10px;}
.card-list li{
  display:flex;gap:10px;align-items:flex-start;
  background:var(--mint-light);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-weight:700;color:var(--plum);
}
.card-list li .ico{flex-shrink:0;font-size:1.3rem;}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--sky-light);
  color:var(--plum);
  font-weight:800;
  padding:6px 14px;
  border-radius:999px;
  font-size:0.95rem;
  margin:4px 6px 4px 0;
}
.formula-card{
  background:linear-gradient(135deg,var(--sun-light),var(--coral-light));
  border-radius:var(--radius-md);
  padding:18px 22px;
  margin:14px 0;
  text-align:center;
  box-shadow:0 8px 18px rgba(255,150,100,0.25);
}
.formula-card .katex{font-size:1.4rem;color:var(--plum);}
.tip-box{
  background:var(--mint-light);
  border-left:6px solid var(--mint);
  border-radius:12px;
  padding:12px 16px;
  font-weight:700;
  color:var(--plum);
  margin:14px 0;
}
.example-box{
  background:var(--lavender-light);
  border-radius:var(--radius-md);
  padding:16px 18px;
  margin:12px 0;
}
.reveal-btn{
  background:var(--coral);
  color:#fff;font-weight:800;border:none;
  padding:10px 20px;border-radius:999px;
  font-size:0.95rem;
  box-shadow:0 6px 14px rgba(255,122,92,0.35);
  transition:transform .15s;
}
.reveal-btn:hover{transform:translateY(-2px) scale(1.03);}
.answer-panel{
  margin-top:12px;
  background:var(--sun-light);
  border-radius:var(--radius-md);
  padding:14px 18px;
  display:none;
  font-weight:700;
  color:var(--plum);
}
.answer-panel.show{display:block;animation:pageIn .35s ease;}

/* compare / guess buttons */
.compare-row{display:flex;gap:16px;flex-wrap:wrap;margin:14px 0;align-items:stretch;}
.guess-card{
  flex:1;min-width:140px;
  background:var(--sky-light);
  border:3px solid transparent;
  border-radius:var(--radius-md);
  padding:14px;
  text-align:center;
  font-weight:800;
  color:var(--plum);
  transition:all .18s;
}
.guess-card:hover{transform:translateY(-3px);box-shadow:0 8px 16px rgba(74,59,92,0.15);}
.guess-card.correct{background:var(--mint-light);border-color:var(--mint);}
.guess-card.wrong{background:#FFE1DA;border-color:var(--coral);}
.guess-feedback{
  margin-top:10px;font-weight:800;color:var(--mint);min-height:1.4em;
}

/* quiz */
.quiz-block{
  background:var(--sky-light);
  border-radius:var(--radius-md);
  padding:16px 20px;
  margin:16px 0;
}
.quiz-q{font-weight:800;color:var(--plum);margin-bottom:10px;font-size:1.02rem;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.opt-btn{
  text-align:left;
  background:#fff;
  border:2px solid var(--lavender-light);
  border-radius:12px;
  padding:10px 14px;
  font-weight:700;color:var(--plum);
  font-size:0.98rem;
}
.opt-btn:hover{border-color:var(--lavender);}
.opt-btn.correct{background:var(--mint-light);border-color:var(--mint);color:var(--mint);}
.opt-btn.wrong{background:#FFE1DA;border-color:var(--coral);}
.opt-btn:disabled{cursor:default;}
.quiz-fb{margin-top:8px;font-weight:800;min-height:1.3em;}

/* matching game */
.match-wrap{display:flex;gap:26px;flex-wrap:wrap;margin:16px 0;}
.match-col{flex:1;min-width:180px;display:flex;flex-direction:column;gap:10px;}
.match-item{
  background:#fff;border:2px solid var(--lavender-light);border-radius:12px;
  padding:10px 14px;font-weight:800;color:var(--plum);text-align:center;
}
.match-item.selected{border-color:var(--sun);background:var(--sun-light);}
.match-item.locked{background:var(--mint-light);border-color:var(--mint);color:var(--mint);}

/* checklist */
.check-item{
  display:flex;align-items:center;gap:12px;
  background:var(--lavender-light);
  border-radius:var(--radius-md);
  padding:12px 16px;margin-bottom:10px;
  font-weight:700;color:var(--plum);
  cursor:pointer;
  transition:background .2s;
}
.check-item.checked{background:var(--mint-light);}
.check-box{
  width:26px;height:26px;border-radius:8px;
  background:#fff;border:2px solid var(--lavender);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-weight:900;color:var(--mint);
}
.check-item.checked .check-box{border-color:var(--mint);}

/* stars */
.star-row{display:flex;gap:8px;margin:14px 0;}
.star-btn{font-size:2.2rem;background:none;border:none;filter:grayscale(1) opacity(0.5);transition:transform .15s;}
.star-btn.active{filter:none;transform:scale(1.15);}

/* nav controls */
.nav-controls{
  width:100%;max-width:900px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-top:18px;
}
.nav-btn{
  font-family:'Fredoka',sans-serif;font-weight:600;
  border:none;border-radius:999px;
  padding:13px 26px;font-size:1rem;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 18px rgba(74,59,92,0.2);
  transition:transform .15s;
}
.nav-btn:hover{transform:translateY(-2px);}
.nav-btn:disabled{opacity:0.35;transform:none;cursor:default;box-shadow:none;}
.nav-prev{background:#fff;color:var(--lavender-deep);}
.nav-next{background:linear-gradient(90deg,var(--lavender),var(--sky));color:#fff;}
.dot-label{font-weight:800;color:var(--plum);font-size:0.9rem;text-align:center;}

/* certificate */
.cert{
  border:4px dashed var(--sun);
  border-radius:var(--radius-lg);
  padding:26px;text-align:center;
  background:linear-gradient(160deg,#fff, var(--sun-light));
  margin-top:16px;
}
.cert input{
  font-family:'Fredoka',sans-serif;
  font-size:1.3rem;text-align:center;
  border:none;border-bottom:3px solid var(--coral);
  background:transparent;color:var(--lavender-deep);
  padding:6px 10px;width:80%;max-width:340px;
}
.cert input:focus{outline:none;}

/* decorative floats */
.floaty{position:absolute;opacity:0.5;pointer-events:none;}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.floaty{animation:floatY 4s ease-in-out infinite;}

@media (max-width:600px){
  .book{padding:24px 18px 24px;min-height:520px;}
  h2{font-size:1.35rem;}
  .content-grid{gap:14px;}
  .nav-btn{padding:12px 16px;font-size:0.9rem;}
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media (max-width:520px){.grid-2{grid-template-columns:1fr;}}
.info-tile{
  background:var(--sky-light);border-radius:var(--radius-sm);
  padding:12px;text-align:center;font-weight:700;color:var(--plum);
}
.info-tile .big{font-size:1.6rem;display:block;margin-bottom:4px;}
</style>
</head>
<body>

<div class="tape-wrap">
  <div class="tape-title">
    <div class="brand" id="brandLogo"></div>
    <div class="page-count" id="pageCountContainer"><span id="pageNumLbl">1</span> / 26</div>
  </div>
  <div class="tape">
    <div class="tape-fill" id="tapeFill" style="width:0%"></div>
    <div class="tape-ticks" id="tapeTicks"></div>
    <div class="tape-marker" id="tapeMarker"></div>
  </div>
</div>

<div class="book-stage">
  <div class="book" id="book"></div>
</div>

<div class="nav-controls">
  <button class="nav-btn nav-prev" id="prevBtn">◀ Sebelumnya</button>
  <div class="dot-label" id="sectionLbl"></div>
  <button class="nav-btn nav-next" id="nextBtn">Selanjutnya ▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script>
/* =========================================================
   LIBRARY ILUSTRASI — SVG pseudo-3D (Gradien + Bayangan)
   ========================================================= */
const COLORS = {lav:'#8C6FC7',lavD:'#6E4FA8',mint:'#3FB88C',sky:'#4AA3E0',coral:'#FF7A5C',sun:'#FFC94A',plum:'#4A3B5C'};

function svgWrap(inner,vb='0 0 200 200',w=160){
  return `<svg viewBox="${vb}" width="${w}" style="max-width:100%;height:auto;overflow:visible" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

/* ---- Kelinci Mascot "Nana" dalam berbagai pose ---- */
function bunny(pose='wave', size=150){
  const defs = `
  <defs>
    <linearGradient id="bBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F0E6FF"/>
    </linearGradient>
    <linearGradient id="bEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#E6D6FA"/>
    </linearGradient>
    <radialGradient id="bCheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB6A3"/><stop offset="100%" stop-color="#FFB6A3" stop-opacity="0"/>
    </radialGradient>
    <filter id="bShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4A3B5C" flood-opacity="0.25"/>
    </filter>
  </defs>`;
  // telinga
  const ears = `
    <ellipse cx="72" cy="42" rx="16" ry="40" fill="url(#bEar)" transform="rotate(-12 72 42)" stroke="#D9C4F2" stroke-width="2"/>
    <ellipse cx="128" cy="42" rx="16" ry="40" fill="url(#bEar)" transform="rotate(12 128 42)" stroke="#D9C4F2" stroke-width="2"/>
    <ellipse cx="72" cy="46" rx="7" ry="26" fill="#FFD9EC" transform="rotate(-12 72 46)"/>
    <ellipse cx="128" cy="46" rx="7" ry="26" fill="#FFD9EC" transform="rotate(12 128 46)"/>`;
  // badan dan kepala
  const head = `<ellipse cx="100" cy="120" rx="58" ry="54" fill="url(#bBody)" stroke="#D9C4F2" stroke-width="2.5"/>`;
  const cheeks = `<circle cx="72" cy="128" r="12" fill="url(#bCheek)"/><circle cx="128" cy="128" r="12" fill="url(#bCheek)"/>`;
  let face='', arms='', extra='';
  if(pose==='wave'){
    face = eyesFace('happy');
    arms = `<path d="M148 130 Q178 110 172 78" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <circle cx="172" cy="76" r="11" fill="url(#bBody)" stroke="#D9C4F2" stroke-width="2"/>
            <path d="M52 130 Q40 150 52 165" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>`;
  } else if(pose==='point'){
    face = eyesFace('happy');
    arms = `<path d="M150 128 Q186 118 196 100" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <circle cx="198" cy="98" r="9" fill="url(#bBody)" stroke="#D9C4F2" stroke-width="2"/>
            <path d="M52 130 Q40 148 50 162" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>`;
  } else if(pose==='think'){
    face = eyesFace('think');
    arms = `<path d="M140 118 Q128 90 108 84" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <path d="M60 130 Q46 150 58 164" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>`;
  } else if(pose==='celebrate'){
    face = eyesFace('star');
    arms = `<path d="M150 126 Q182 100 178 66" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <path d="M50 126 Q18 100 22 66" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <circle cx="178" cy="64" r="10" fill="url(#bBody)" stroke="#D9C4F2" stroke-width="2"/>
            <circle cx="22" cy="64" r="10" fill="url(#bBody)" stroke="#D9C4F2" stroke-width="2"/>`;
  } else if(pose==='ruler'){
    face = eyesFace('happy');
    arms = `<path d="M145 132 Q176 132 190 118" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <path d="M55 132 Q30 128 20 112" stroke="#F0E6FF" stroke-width="16" stroke-linecap="round" fill="none"/>
            <rect x="14" y="98" width="118" height="18" rx="5" fill="${COLORS.sun}" stroke="#E0A62E" stroke-width="2" transform="rotate(-8 73 107)"/>`;
  }
  const nose = `<path d="M94 138 Q100 144 106 138 Q100 148 94 138Z" fill="#C77B9E"/>`;
  const body = `${ears}${head}${cheeks}${face}${nose}${arms}`;
  return `<svg viewBox="0 0 200 200" width="${size}" style="max-width:100%;height:auto;overflow:visible;filter:url(#bShadow)" xmlns="http://www.w3.org/2000/svg">${defs}${body}</svg>`;
}
function eyesFace(kind){
  if(kind==='happy') return `<circle cx="82" cy="112" r="6.5" fill="${COLORS.plum}"/><circle cx="118" cy="112" r="6.5" fill="${COLORS.plum}"/>
    <circle cx="84" cy="109" r="2" fill="#fff"/><circle cx="120" cy="109" r="2" fill="#fff"/>`;
  if(kind==='think') return `<path d="M76 112 q6 -6 12 0" stroke="${COLORS.plum}" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="118" cy="112" r="6.5" fill="${COLORS.plum}"/><circle cx="120" cy="109" r="2" fill="#fff"/>`;
  if(kind==='star') return `<path d="M82 106l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6-4.5-4 6-1z" fill="${COLORS.sun}"/>
    <path d="M118 106l3 6 6 1-4.5 4 1 6-5.5-3-5.5 3 1-6-4.5-4 6-1z" fill="${COLORS.sun}"/>`;
  return '';
}

/* ---- Penggaris (ruler) dengan angka skala ---- */
function ruler(len=15, highlight=0, label='', width=280){
  const startX=20, endX=280, top=20, h=46;
  const scale=(endX-startX)/len;
  let ticks='';
  for(let i=0;i<=len;i++){
    const x=startX+i*scale;
    const tall = i%5===0;
    ticks += `<line x1="${x}" y1="${top}" x2="${x}" y2="${top+(tall?22:12)}" stroke="${COLORS.plum}" stroke-width="${tall?2:1}"/>`;
    if(tall) ticks += `<text x="${x}" y="${top+34}" font-size="11" font-weight="800" fill="${COLORS.plum}" text-anchor="middle" font-family="Nunito">${i}</text>`;
  }
  let hi='';
  if(highlight>0){
    hi = `<rect x="${startX}" y="${top+2}" width="${highlight*scale}" height="16" rx="4" fill="${COLORS.coral}" opacity="0.55"/>
          <text x="${startX+ (highlight*scale)/2}" y="${top-6}" font-size="12" font-weight="800" fill="${COLORS.coral}" text-anchor="middle" font-family="Nunito">${label}</text>`;
  }

/* ---- Timbangan Jarum Analog (Pembaruan dari Game) ---- */
function gaugeDial(maxVal, minorStep, majorStep, value, unitLabel, width=260){
  const cx=130, cy=130, r=96;
  function pt(v, radius){
    const theta = Math.PI - (v/maxVal)*Math.PI;
    return {x: cx+radius*Math.cos(theta), y: cy-radius*Math.sin(theta)};
  }
  let ticks='';
  for(let v=0; v<=maxVal; v+=minorStep){
    const isMajor = (Math.round(v*100) % Math.round(majorStep*100) === 0);
    const p1 = pt(v, r);
    const p2 = pt(v, isMajor? r-15 : r-8);
    ticks += `<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke="${COLORS.plum}" stroke-width="${isMajor?3:1.5}"/>`;
    if(isMajor){
      const lp = pt(v, r-32);
      ticks += `<text x="${lp.x.toFixed(1)}" y="${(lp.y+4).toFixed(1)}" font-size="13" font-weight="800" fill="${COLORS.plum}" text-anchor="middle" font-family="Nunito">${v}</text>`;
    }
  }
  const tip = pt(value, r-22);
  const needle = `<line x1="${cx}" y1="${cy}" x2="${tip.x.toFixed(1)}" y2="${tip.y.toFixed(1)}" stroke="${COLORS.coral}" stroke-width="5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="10" fill="${COLORS.coral}" stroke="#fff" stroke-width="2"/>`;
  return `<svg viewBox="0 0 260 200" width="${width}" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="gShadow"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#4A3B5C" flood-opacity="0.25"/></filter></defs>
    <g filter="url(#gShadow)">
      <path d="M ${cx-r-16} ${cy} A ${r+16} ${r+16} 0 0 1 ${cx+r+16} ${cy}" fill="#FFFDF3" stroke="#E9D9A0" stroke-width="2"/>
      <line x1="${cx-r-16}" y1="${cy}" x2="${cx+r+16}" y2="${cy}" stroke="#E9D9A0" stroke-width="2"/>
      ${ticks}
      ${needle}
      <rect x="${cx-46}" y="${cy+14}" width="92" height="32" rx="10" fill="${COLORS.mint}"/>
      <text x="${cx}" y="${cy+35}" font-size="15" font-weight="800" fill="#fff" text-anchor="middle" font-family="Fredoka">${unitLabel}</text>
    </g>
  </svg>`;
}

/* ---- Neraca Keseimbangan (Dua Sisi) ---- */
function balance(leftEmoji='🐜', rightEmoji='🐘', tilt='right', width=260){
  const ang = tilt==='right'? 10 : (tilt==='left'? -10 : 0);
  const leftY = tilt==='right'? -6 : (tilt==='left'? 14 : 4);
  const rightY = tilt==='right'? 14 : (tilt==='left'? -6 : 4);
  return `<svg viewBox="0 0 260 190" width="${width}" style="max-width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
  <defs><filter id="baShadow"><feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#4A3B5C" flood-opacity="0.25"/></filter></defs>
  <g filter="url(#baShadow)">
    <rect x="126" y="60" width="8" height="90" rx="3" fill="${COLORS.lavD}"/>
    <rect x="90" y="150" width="80" height="10" rx="4" fill="${COLORS.lavD}"/>
    <circle cx="130" cy="55" r="9" fill="${COLORS.sun}"/>
    <g transform="rotate(${ang} 130 55)">
      <line x1="130" y1="55" x2="45" y2="60" stroke="${COLORS.plum}" stroke-width="4"/>
      <line x1="130" y1="55" x2="215" y2="60" stroke="${COLORS.plum}" stroke-width="4"/>
      <line x1="45" y1="60" x2="45" y2="${95+leftY}" stroke="${COLORS.plum}" stroke-width="2"/>
      <line x1="215" y1="60" x2="215" y2="${95+rightY}" stroke="${COLORS.plum}" stroke-width="2"/>
      <ellipse cx="45" cy="${105+leftY}" rx="34" ry="14" fill="${COLORS.sky}" opacity="0.35"/>
      <text x="45" y="${112+leftY}" font-size="30" text-anchor="middle">${leftEmoji}</text>
      <ellipse cx="215" cy="${105+rightY}" rx="34" ry="14" fill="${COLORS.coral}" opacity="0.35"/>
      <text x="215" y="${112+rightY}" font-size="30" text-anchor="middle">${rightEmoji}</text>
    </g>
  </g>
  </svg>`;
}

/* =========================================================
   MESIN HALAMAN BUKU, NAVIGASI, & SKALA KEMAJUAN (TAPE PROGRESS)
   ========================================================= */
let current = 0;
const TOTAL = PAGES.length;

function renderPage(i){
  if(i<0 || i>=TOTAL) return;
  current = i;
  document.getElementById('book').innerHTML = PAGES[i].html;
  document.querySelectorAll('.kx-holder').forEach(el=>{
    try{ katex.render(el.getAttribute('data-tex'), el, {throwOnError:false}); }catch(e){}
  });
  updateNav();
  updateTape();
  document.querySelector('.book-stage').scrollIntoView({behavior:'smooth', block:'start'});
}
function updateNav(){
  document.getElementById('pageNumLbl').textContent = current+1;
  document.getElementById('sectionLbl').textContent = PAGES[current].navLabel;
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===TOTAL-1;
  document.getElementById('nextBtn').textContent = current===TOTAL-1 ? 'Selesai 🎉' : 'Selanjutnya ▶';
}
function updateTape(){
  document.getElementById('tapeFill').style.width = (current/(TOTAL-1)*100)+'%';
  document.getElementById('tapeMarker').style.left = ((current+0.5)/TOTAL*100)+'%';
  document.querySelectorAll('.tick').forEach((t,idx)=>{
    t.classList.toggle('done', idx<current);
    t.classList.toggle('current', idx===current);
  });
}
function initTicks(){
  const wrap = document.getElementById('tapeTicks');
  let html='';
  for(let i=0;i<TOTAL;i++){
    const showNum = (i+1)%5===0 || i===0 || i===TOTAL-1;
    html += `<div class="tick" onclick="renderPage(${i})"><span>${showNum?(i+1):''}</span></div>`;
  }
  wrap.innerHTML = html;
  document.getElementById('tapeMarker').innerHTML = `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="130" r="46" fill="${COLORS.coral}"/><circle cx="55" cy="70" r="20" fill="${COLORS.coral}"/><circle cx="100" cy="50" r="20" fill="${COLORS.coral}"/><circle cx="145" cy="70" r="20" fill="${COLORS.coral}"/></svg>`;
}

/* Penanganan interaksi kuis */
function guessPick(el, isCorrect){
  const row = el.closest('.compare-row');
  row.querySelectorAll('.guess-card').forEach(c=>{
    c.classList.remove('correct','wrong');
    if(c.dataset.correct==='true') c.classList.add('correct');
  });
  if(!isCorrect) el.classList.add('wrong');
  const fb = row.nextElementSibling;
  if(fb && fb.classList.contains('guess-feedback')){
    fb.textContent = isCorrect ? '✅ Tepat! Kamu jago mengamati ukuran.' : '❌ Hampir! Yang berlatar hijau adalah jawaban benarnya.';
  }
}
function answerMCQ(el, isCorrect, fbId){
  const opts = el.parentElement;
  [...opts.children].forEach(b=>{
    b.disabled = true;
    if(b.dataset.correct==='true') b.classList.add('correct');
  });
  if(!isCorrect) el.classList.add('wrong');
  const fb = document.getElementById(fbId);
  if(fb) fb.textContent = isCorrect ? '✅ Benar! Kamu hebat!' : '❌ Belum tepat, perhatikan lingkaran hijau ya.';
}

/* Logika mencocokkan pasangan */
let matchSelected = null;
function matchClick(el, key){
  if(el.classList.contains('locked')) return;
  if(!matchSelected){
    matchSelected = {el, key};
    el.classList.add('selected');
    return;
  }
  if(matchSelected.el === el){
    el.classList.remove('selected');
    matchSelected = null;
    return;
  }
  if(matchSelected.key === key){
    matchSelected.el.classList.remove('selected');
    matchSelected.el.classList.add('locked');
    el.classList.add('locked');
    matchSelected = null;
    const locked = document.querySelectorAll('.match-item.locked').length;
    const total = document.querySelectorAll('.match-item').length;
    if(locked===total){
      const fb = document.getElementById('matchFb');
      if(fb) fb.textContent = '🎉 Semua pasangan benar! Kamu memang jago mencocokkan alat ukur!';
    }
  } else {
    el.classList.add('wrong');
    matchSelected.el.classList.add('wrong');
    const prev = matchSelected;
    setTimeout(()=>{
      el.classList.remove('wrong');
      prev.el.classList.remove('selected','wrong');
    }, 650);
    matchSelected = null;
  }
}

/* Interaksi ceklis & rating bintang */
function toggleCheck(el){
  el.classList.toggle('checked');
  const box = el.querySelector('.check-box');
  box.textContent = el.classList.contains('checked') ? '✓' : '';
}
function setStars(n){
  document.querySelectorAll('.star-btn').forEach((s,i)=>s.classList.toggle('active', i<n));
  const msgs = ['Yuk, ulangi lagi sedikit ya, kamu pasti bisa!','Yuk, ulangi lagi sedikit ya, kamu pasti bisa!','Bagus! Terus berlatih, ya.','Bagus! Terus berlatih, ya.','Keren sekali! Kamu bintang pengukur!'];
  document.getElementById('starMsg').textContent = msgs[n-1];
}

/* Navigasi tombol dan tombol keyboard panah */
document.getElementById('prevBtn').addEventListener('click', ()=>renderPage(current-1));
document.getElementById('nextBtn').addEventListener('click', ()=>renderPage(Math.min(current+1, TOTAL-1)));
document.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowRight') renderPage(Math.min(current+1, TOTAL-1));
  if(e.key==='ArrowLeft') renderPage(current-1);
});

/* Inisialisasi awal */
document.getElementById('brandLogo').innerHTML = bunny('wave',30) + '<span>Kebun Ukur Nana</span>';
document.getElementById('pageCountContainer').innerHTML = `<span id="pageNumLbl">1</span> / ${TOTAL}`;
initTicks();
renderPage(0);
</script>
</body>
</html>
